version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: rta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: collector
      POSTGRES_PASSWORD: collector
      POSTGRES_DB: collector
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  minio:
    image: minio/minio:latest
    container_name: rta-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    build:
      context: .
      dockerfile: docker/minio-init.Dockerfile
    depends_on:
      - minio

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: development
    container_name: rta-api
    restart: unless-stopped
    env_file:
      - .env.example
      - .env
    environment:
      DATABASE_URL: postgresql://collector:collector@postgres:5432/collector
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./:/workspace
    depends_on:
      - postgres
      - minio

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
      target: development
    container_name: rta-bot
    restart: unless-stopped
    env_file:
      - .env.example
      - .env
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_SPAWN_CHANNEL_ID: ${DISCORD_SPAWN_CHANNEL_ID}
      ADMIN_ROLE_ID: ${ADMIN_ROLE_ID}
      NODE_ENV: development
    volumes:
      - ./:/workspace
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: development
    container_name: rta-web
    restart: unless-stopped
    env_file:
      - .env.example
      - .env
    environment:
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      DATABASE_URL: postgresql://collector:collector@postgres:5432/collector
      PRISMA_QUERY_ENGINE_LIBRARY: /workspace/packages/database/node_modules/.prisma/client/libquery_engine-debian-openssl-3.0.x.so.node
      API_BASE_URL: ${API_BASE_URL}
      INTERNAL_API_URL: http://api:4000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
    depends_on:
      - api

volumes:
  pgdata:
  minio-data:
